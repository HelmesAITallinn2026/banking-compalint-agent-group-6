spring.application.name=bca-backend
server.port=8080
server.address=0.0.0.0

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/bca-g6
spring.datasource.username=bca_g6_app
spring.datasource.password=bca_g6_app_change_me
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# Schema is managed by SQL scripts; do not auto-create or validate here
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── File upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── Custom app config ─────────────────────────────────────────
# Upload directory (absolute path or relative to working directory)
app.upload.dir=${user.home}/bca-uploads

# Email stub — set to true and configure spring.mail.* for real SMTP
app.email.enabled=false

# ── OpenAPI / Swagger ──────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ── Logging ───────────────────────────────────────────────────
logging.level.com.bcag6=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
